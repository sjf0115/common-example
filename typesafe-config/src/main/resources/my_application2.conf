# 1. HOCON 示例
database {
  host = localhost
  port = 5432
  username = admin
  password = secret

  pool {
    min = 5
    max = 20
    timeout = 30s
  }
}

# 2. 省略逗号和引号
server {
  host = localhost      # 不需要引号（无特殊字符时）
  port = 8080           # 不需要逗号（换行即可分隔）
  enabled = true        # 布尔值
}

# 3. 变量替换与继承
defaults {
  timeout = 30s
  retries = 3
}

# 继承并覆盖
http-client = ${defaults} {
  timeout = 60s  # 覆盖 timeout，保留 retries = 3
}

grpc-client = ${defaults} {
  retries = 5    # 覆盖 retries，保留 timeout = 30s
}

# 4. 环境变量支持
database-var {
  maven-home = ${MAVEN_HOME}           # 从环境变量读取
  password = ${?DB_PASSWORD}  # ? 表示可选，不存在时不报错
}

# 5. 数组操作
path = ["/usr/bin"]
path += "/usr/local/bin"     # 追加元素
path += "/opt/bin"

# 6. 多行字符串
sql.query = """
  SELECT u.id, u.name, u.email
  FROM users u
  WHERE u.status = 'active'
  ORDER BY u.created_at DESC
"""